name: llvmlite_win-64_wheel_builder

on:
  workflow_dispatch:
    inputs:
      llvmdev_run_id:
        description: 'llvmdev workflow run ID (optional)'
        required: false
        type: string

env:
  CONDA_CHANNEL: numba
  CONDA_LABEL: ci

jobs:
  win-64-build:
    name: win-64-build
    runs-on: windows-2019
    defaults:
      run:
        shell: bash -elx {0}
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13"]
      fail-fast: false

    steps:
      - name: Clone repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Miniconda
        uses: conda-incubator/setup-miniconda@v3
        with:
          python-version: ${{ matrix.python-version }}
          channels: numba/label/win64_wheel,defaults,numba

      - name: Install build dependencies
        run: conda install llvmdev=15 cmake libxml2

      - name: Build wheel
        run: |
          python setup.py bdist_wheel

      - name: Upload llvmlite wheel
        uses: actions/upload-artifact@v4
        with:
          name: llvmlite-win-64-py${{ matrix.python-version }}
          path: dist/*.whl
          compression-level: 0
          retention-days: 7
          if-no-files-found: error

  win-64-validate:
    name: win-64-validate
    needs: win-64-build
    runs-on: windows-2019
    defaults:
      run:
        shell: bash -elx {0}
    steps:
      - name: Clone repository
        uses: actions/checkout@v4

      - name: Setup Miniconda
        uses: conda-incubator/setup-miniconda@v3
        with:
          python-version: "3.12"

      - name: Install validation dependencies
        run: conda install py-lief wheel twine keyring rfc3986

      - name: Download llvmlite wheels
        uses: actions/download-artifact@v4
        with:
          pattern: llvmlite-win-64-*
          path: dist
          merge-multiple: true

      - name: Validate wheels
        run: |
          cd dist
          for WHL_FILE in *.whl; do
            wheel unpack $WHL_FILE
            python $GITHUB_WORKSPACE/buildscripts/github/validate_win64_wheel.py llvmlite/binding/llvmlite.dll
            twine check $WHL_FILE
          done

  win-64-test:
    name: win-64-test
    needs: win-64-validate
    runs-on: windows-2019
    defaults:
      run:
        shell: bash -elx {0}
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13"]
      fail-fast: false

    steps:
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Download llvmlite wheel
        uses: actions/download-artifact@v4
        with:
          name: llvmlite-win-64-py${{ matrix.python-version }}
          path: dist

      - name: Install and test
        run: |
          # First add the wheel's directory to PYTHONPATH so pip can find it
          export PYTHONPATH=$PWD/dist:$PYTHONPATH
          # Install dependencies first
          pip install wheel
          # Unpack the wheel to get the DLL path
          cd dist && wheel unpack *.whl && cd ..
          # Add the DLL directory to PATH before installing
          export PATH="$PATH:$PWD/dist/llvmlite-*/llvmlite/binding"
          # Now install and test
          pip install dist/*.whl
          python -m llvmlite.tests
