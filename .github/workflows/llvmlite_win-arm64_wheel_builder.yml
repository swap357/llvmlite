name: llvmlite_win-arm64_wheel_builder

on:
  pull_request:
    paths:
      - .github/workflows/llvmlite_win-arm64_wheel_builder.yml
      - buildscripts/github/validate_win-64_wheel.py
      - ffi/**
      - setup.py
      - versioneer.py
  label:
    types: [created]
  workflow_dispatch:
    inputs:
      llvmdev_run_id:
        description: 'llvmdev workflow run ID (optional)'
        required: false
        type: string
      upload_wheel_to_anaconda:
        description: 'Upload wheel to Anaconda Cloud - numba channel'
        required: false
        type: boolean
        default: false

concurrency:
  group: >-
    ${{ github.workflow }}-
    ${{ github.event.pull_request.number
      || toJson(github.event.inputs)
      || github.event.label.name
      || github.sha }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  FALLBACK_LLVMDEV_VERSION: "22"
  CONDA_CHANNEL_NUMBA: swap357/label/llvm_wheel
  VALIDATION_PYTHON_VERSION: "3.12"
  ARTIFACT_RETENTION_DAYS: 7
  WIN_ARM64_CONDA_CHANNEL: bootstrap-win-arm64-round-2-native
  CONDA_SUBDIR: win-arm64

jobs:

  win-arm64-build:
    name: win-arm64-build
    runs-on: windows-11-arm
    defaults:
      run:
        shell: bash -el {0}
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13", "3.14"]
      fail-fast: false

    steps:
      - name: Clone repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
          fetch-depth: 0

      - name: Set up conda-standalone
        uses: conda-incubator/setup-conda-standalone@00a34805e93a8b640aee5f8a20e8f481ad77e3b4 # v0.1.0
        with:
          channel: ${{ env.WIN_ARM64_CONDA_CHANNEL }}
          destination-directory: ${{ runner.temp }}/conda-standalone

      - name: Download llvmdev Artifact
        if: ${{ github.event.inputs.llvmdev_run_id != '' }}
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: llvmdev_for_wheel_win-arm64
          path: llvmdev_conda_packages
          run-id: ${{ github.event.inputs.llvmdev_run_id }}
          repository: ${{ github.repository }}
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install build dependencies
        run: |
          export CONDA_PREFIX="${RUNNER_TEMP}/conda-build-env"
          "${CONDA_EXE}" create --prefix "${CONDA_PREFIX}" \
            -c "${WIN_ARM64_CONDA_CHANNEL}" -c m2-winarm64 -c main \
            --yes "python=${{ matrix.python-version }}" cmake libxml2 pip
          echo "CONDA_PREFIX=${CONDA_PREFIX}" >> "${GITHUB_ENV}"
          export PATH="${CONDA_PREFIX}/Scripts:${CONDA_PREFIX}/Library/bin:${CONDA_PREFIX}:${PATH}"
          echo "${CONDA_PREFIX}/Library/bin" >> "${GITHUB_PATH}"
          echo "${CONDA_PREFIX}" >> "${GITHUB_PATH}"
          echo "${CONDA_PREFIX}/Scripts" >> "${GITHUB_PATH}"
          if [ -n "${{ github.event.inputs.llvmdev_run_id }}" ]; then
            CHAN="file:///${{ github.workspace }}/llvmdev_conda_packages"
            "${CONDA_EXE}" install --prefix "${CONDA_PREFIX}" -c defaults -c "${CHAN}" \
              "llvmdev=${{ env.FALLBACK_LLVMDEV_VERSION }}"
          else
            CHAN="${{ env.CONDA_CHANNEL_NUMBA }}"
            "${CONDA_EXE}" install --prefix "${CONDA_PREFIX}" -c defaults \
              "${CHAN}::llvmdev=${{ env.FALLBACK_LLVMDEV_VERSION }}"
          fi
          python -m pip install build wheel setuptools delvewheel

      - name: Build wheel
        env:
          LLVMLITE_PACKAGE_FORMAT: wheel
        run: python -m build --wheel --no-isolation

      - name: Repair wheel with delvewheel
        run: |
          mkdir -p wheel_temp
          mv dist/*.whl wheel_temp/
          python -m delvewheel repair --analyze-existing -w dist wheel_temp/*.whl
          ls -l dist

      - name: Upload llvmlite wheel
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: llvmlite-win-arm64-py${{ matrix.python-version }}
          path: dist/*.whl
          compression-level: 0
          retention-days: ${{ env.ARTIFACT_RETENTION_DAYS }}
          if-no-files-found: error

      - name: Show Workflow Run ID
        run: |
          echo "Workflow Run ID: ${{ github.run_id }}"

  win-arm64-validate:
    name: win-arm64-validate
    needs: win-arm64-build
    runs-on: windows-11-arm
    defaults:
      run:
        shell: bash -el {0}
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13", "3.14"]
      fail-fast: false

    steps:
      - name: Clone repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Set up conda-standalone
        uses: conda-incubator/setup-conda-standalone@00a34805e93a8b640aee5f8a20e8f481ad77e3b4 # v0.1.0
        with:
          channel: ${{ env.WIN_ARM64_CONDA_CHANNEL }}
          destination-directory: ${{ runner.temp }}/conda-standalone

      - name: Install validation dependencies
        run: |
          export CONDA_PREFIX="${RUNNER_TEMP}/conda-base"
          "${CONDA_EXE}" create --prefix "${CONDA_PREFIX}" \
            -c "${WIN_ARM64_CONDA_CHANNEL}" \
            --yes "python=${{ env.VALIDATION_PYTHON_VERSION }}" py-lief wheel twine
          echo "CONDA_PREFIX=${CONDA_PREFIX}" >> "${GITHUB_ENV}"
          export PATH="${CONDA_PREFIX}/Scripts:${CONDA_PREFIX}/Library/bin:${CONDA_PREFIX}:${PATH}"
          echo "${CONDA_PREFIX}/Library/bin" >> "${GITHUB_PATH}"
          echo "${CONDA_PREFIX}" >> "${GITHUB_PATH}"
          echo "${CONDA_PREFIX}/Scripts" >> "${GITHUB_PATH}"

      - name: Download llvmlite wheels
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: llvmlite-win-arm64-py${{ matrix.python-version }}
          path: dist

      - name: Validate wheels
        run: |
          cd dist
          for WHL_FILE in *.whl; do
            wheel unpack "$WHL_FILE"
            python "${GITHUB_WORKSPACE}/buildscripts/github/validate_win-64_wheel.py" \
              llvmlite/binding/llvmlite.dll
            twine check "$WHL_FILE"
          done

  win-arm64-test:
    name: win-arm64-test
    needs: win-arm64-validate
    runs-on: windows-11-arm
    defaults:
      run:
        shell: bash -el {0}
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13", "3.14"]
      fail-fast: false

    steps:
      - name: Set up conda-standalone
        uses: conda-incubator/setup-conda-standalone@00a34805e93a8b640aee5f8a20e8f481ad77e3b4 # v0.1.0
        with:
          channel: ${{ env.WIN_ARM64_CONDA_CHANNEL }}
          destination-directory: ${{ runner.temp }}/conda-standalone

      - name: Download llvmlite wheel
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: llvmlite-win-arm64-py${{ matrix.python-version }}
          path: dist

      - name: Install and test
        env:
          LLVMLITE_DIST_TEST: "1"
        run: |
          export CONDA_PREFIX="${RUNNER_TEMP}/conda-base"
          "${CONDA_EXE}" create --prefix "${CONDA_PREFIX}" \
            -c "${WIN_ARM64_CONDA_CHANNEL}" \
            --yes "python=${{ matrix.python-version }}" pip wheel
          echo "CONDA_PREFIX=${CONDA_PREFIX}" >> "${GITHUB_ENV}"
          export PATH="${CONDA_PREFIX}/Scripts:${CONDA_PREFIX}/Library/bin:${CONDA_PREFIX}:${PATH}"
          echo "${CONDA_PREFIX}/Library/bin" >> "${GITHUB_PATH}"
          echo "${CONDA_PREFIX}" >> "${GITHUB_PATH}"
          echo "${CONDA_PREFIX}/Scripts" >> "${GITHUB_PATH}"
          python -m pip install --upgrade pip wheel lief
          cd dist
          whl=$(ls -1 ./*.whl)
          echo "Using wheel: $whl"
          python -m pip install "$whl"
          python -m llvmlite.tests

  win-arm64-upload:
    name: win-arm64-upload
    needs: win-arm64-test
    if: github.event_name == 'workflow_dispatch' && inputs.upload_wheel_to_anaconda
    runs-on: windows-11-arm
    defaults:
      run:
        shell: bash -el {0}
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13", "3.14"]
      fail-fast: false

    steps:
      - name: Set up conda-standalone
        uses: conda-incubator/setup-conda-standalone@00a34805e93a8b640aee5f8a20e8f481ad77e3b4 # v0.1.0
        with:
          channel: ${{ env.WIN_ARM64_CONDA_CHANNEL }}
          destination-directory: ${{ runner.temp }}/conda-standalone

      - name: Install anaconda-client
        run: |
          export CONDA_PREFIX="${RUNNER_TEMP}/conda-base"
          "${CONDA_EXE}" create --prefix "${CONDA_PREFIX}" \
            -c "${WIN_ARM64_CONDA_CHANNEL}" --yes anaconda-client
          echo "CONDA_PREFIX=${CONDA_PREFIX}" >> "${GITHUB_ENV}"
          echo "${CONDA_PREFIX}/Library/bin" >> "${GITHUB_PATH}"
          echo "${CONDA_PREFIX}" >> "${GITHUB_PATH}"
          echo "${CONDA_PREFIX}/Scripts" >> "${GITHUB_PATH}"

      - name: Download llvmlite wheel
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: llvmlite-win-arm64-py${{ matrix.python-version }}
          path: dist

      - name: Upload wheel to Anaconda Cloud
        env:
          ANACONDA_API_TOKEN: ${{ secrets.NUMBA_CHANNEL_WHEEL_UPLOAD }}
        run: |
          cd dist
          whl=$(ls -1 ./*.whl)
          echo "Uploading wheel: $whl"
          anaconda -t "$ANACONDA_API_TOKEN" upload --force -u numba -l dev "$whl"
