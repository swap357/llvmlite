name: llvmlite-build

on:
  workflow_dispatch:
    inputs:
      llvmdev_run_id:
        description: 'llvmdev workflow run ID (optional)'
        required: false
        type: string

jobs:
  windows:
    name: windows
    runs-on: windows-2019
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13"]
      env:
        BUILD_PYTHON: "3.12"  # Use Python 3.12 for conda-build environment
      fail-fast: false
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Download LLVMDEV Artifact
        if: ${{ inputs.llvmdev_run_id != '' }}
        uses: actions/download-artifact@v4
        with:
          name: llvmdev-windows-x86_64
          path: llvmdev-pkg
          run-id: ${{ inputs.llvmdev_run_id }}
          repository: ${{ github.repository }}
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install Visual Studio
        shell: powershell
        run: |
          Invoke-WebRequest -Uri https://aka.ms/vs/16/release/vs_buildtools.exe -OutFile vs_buildtools.exe
          Start-Process -FilePath .\vs_buildtools.exe -ArgumentList `
            "--quiet", "--wait", "--norestart", "--nocache", `
            "--installPath", "C:\BuildTools", `
            "--add", "Microsoft.VisualStudio.Workload.VCTools", `
            "--add", "Microsoft.VisualStudio.Component.VC.Tools.x86.x64", `
            "--add", "Microsoft.VisualStudio.Component.Windows10SDK", `
            "--add", "Microsoft.VisualStudio.Component.VC.DiagnosticTools", `
            "--add", "Microsoft.VisualStudio.Component.VC.ATL", `
            "--add", "Microsoft.VisualStudio.Component.VC.14.29", `
            "--add", "Microsoft.VisualStudio.Component.VC.ATLMFC" `
            -NoNewWindow -Wait

      - name: Setup MSBuild
        uses: microsoft/setup-msbuild@v1.1
        with:
          msbuild-architecture: x64

      - name: Install Miniconda
        shell: pwsh
        run: |
          $wc = New-Object net.webclient
          $wc.Downloadfile("https://repo.anaconda.com/miniconda/Miniconda3-latest-Windows-x86_64.exe", "Miniconda3-latest-Windows-x86_64.exe")
          Start-Process "Miniconda3-latest-Windows-x86_64.exe" "/S /D=C:\Miniconda3" -Wait

      - name: Create Build Environment
        shell: bash
        run: |
          source /c/Miniconda3/Scripts/activate
          # Use Python 3.12 for build environment if target is 3.13
          BUILD_PYTHON="${{ matrix.python-version }}"
          if [ "$BUILD_PYTHON" = "3.13" ]; then
            BUILD_PYTHON="${{ env.BUILD_PYTHON }}"
          fi
          conda create -n build_env \
            python=$BUILD_PYTHON \
            conda-build \
            setuptools \
            wheel \
            cmake \
            libxml2 \
            vs2019_win-64 \
            -y
          conda activate build_env
          if [ "${{ inputs.llvmdev_run_id }}" != "" ]; then
            # Install local llvmdev package if workflow ID provided
            conda install -y ./llvmdev-pkg/*.tar.bz2
          else
            # Install from numba channel if no workflow ID
            conda install -y -c numba/label/ci llvmdev
          fi
          # Export environment variables
          echo "VS_VERSION=2019" >> $GITHUB_ENV
          echo "VS_PLATFORM=x64" >> $GITHUB_ENV
          echo "LLVM_ENABLE_DIA_SDK=OFF" >> $GITHUB_ENV
          echo "CMAKE_GENERATOR=Visual Studio 16 2019" >> $GITHUB_ENV
          echo "CMAKE_GENERATOR_PLATFORM=x64" >> $GITHUB_ENV
          echo "CMAKE_GENERATOR_TOOLSET=v142" >> $GITHUB_ENV
          # Set target Python version for conda-build
          echo "CONDA_PY=${{ matrix.python-version }}" >> $GITHUB_ENV

      - name: Build Conda Package
        shell: bash
        run: |
          source /c/Miniconda3/Scripts/activate
          conda activate build_env
          RECIPE_NAME=./conda-recipes/llvmlite
          conda build $RECIPE_NAME
          echo "CONDA_PKG=$(conda build --output $RECIPE_NAME)" >> $GITHUB_ENV

      - name: Upload Conda Package
        uses: actions/upload-artifact@v4
        with:
          name: llvmlite-win-64-py${{ matrix.python-version }}
          path: ${{ env.CONDA_PKG }}
          retention-days: 7
          if-no-files-found: error