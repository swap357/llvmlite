name: Fast LLD Compatibility Test (Ubuntu)

on:
  workflow_dispatch:
    inputs:
      test_channels:
        description: 'Test additional channels'
        type: boolean
        default: true
  push:
    paths:
      - 'conda-recipes/llvmdev_for_wheel/meta.yaml'
      - '.github/workflows/test_lld_compatibility_ubuntu.yml'
  pull_request:
    paths:
      - 'conda-recipes/llvmdev_for_wheel/meta.yaml'
      - '.github/workflows/test_lld_compatibility_ubuntu.yml'

jobs:
  test-lld-compatibility:
    runs-on: ubuntu-24.04
    defaults:
      run:
        shell: bash -el {0}

    strategy:
      matrix:
        llvmdev_source:
          - { channel: "numba", name: "numba-channel" }
          - { channel: "conda-forge", name: "conda-forge" }
      fail-fast: false

    steps:
      - name: Clone repository
        uses: actions/checkout@v4

      - name: Setup Miniconda
        uses: conda-incubator/setup-miniconda@v3
        with:
          auto-update-conda: true
          auto-activate-base: true
          activate-environment: ''
          run-post: false

      - name: System diagnostics
        run: |
          echo "=== System Information ==="
          uname -a
          echo "GLIBC version:"
          ldd --version | head -1
          echo "GCC version:"
          gcc --version | head -1
          echo "Available libstdc++ versions:"
          find /usr/lib* -name "libstdc++.so*" 2>/dev/null | head -3 || true
          strings /usr/lib/x86_64-linux-gnu/libstdc++.so.6 | grep GLIBCXX | tail -5 || true

      - name: Test ${{ matrix.llvmdev_source.name }} llvmdev package
        run: |
          echo "=== Testing llvmdev from ${{ matrix.llvmdev_source.channel }} ==="

          # Create test environment
          conda create -n test_${{ matrix.llvmdev_source.name }} llvmdev=15 -c ${{ matrix.llvmdev_source.channel }} -y
          conda activate test_${{ matrix.llvmdev_source.name }}

          echo "Package info:"
          conda list llvmdev

          echo "Available LLD binaries:"
          ls $CONDA_PREFIX/bin/ | grep lld || echo "❌ No LLD binaries found"

          # Test the exact commands from your recipe
          echo "=== Testing Recipe Commands ==="

          echo "1. Testing: ld.lld --version"
          if ld.lld --version; then
            echo "ld.lld --version: SUCCESS"
          else
            echo "ld.lld --version: FAILED"
          fi

          echo "2. Checking ld.lld dependencies:"
          if ldd $(which ld.lld); then
            echo "ld.lld dependencies resolved"
          else
            echo "ld.lld dependencies failed"
          fi

          echo "3. Checking GLIBC requirements:"
          echo "GLIBC symbols required by ld.lld:"
          objdump -T $(which ld.lld) | grep GLIBC | sort -V | tail -5 || echo "Could not check GLIBC symbols"

          echo "4. Testing lld-link (Windows, should fail gracefully):"
          if lld-link /? 2>/dev/null; then
            echo "lld-link available"
          else
            echo "lld-link not available (expected on Linux)"
          fi

          conda deactivate

      - name: Test recipe commands simulation
        run: |
          echo "=== Simulating conda recipe test commands ==="

          # Test with numba channel (most common)
          conda create -n recipe_test llvmdev=15 -c numba -y
          conda activate recipe_test

          echo "Simulating the exact test commands from meta.yaml:"
          echo "Commands to test:"
          echo "  - ld.lld --version                    # [unix]"
          echo "  - lld-link /?                         # [win]"

          echo "Testing on Linux (unix):"

          # Set PREFIX like conda build would
          export PREFIX=$CONDA_PREFIX

          echo "Command: ld.lld --version"
          if ld.lld --version; then
            echo "Recipe test would PASS"
          else
            echo "Recipe test would FAIL"
            echo "Exit code: $?"
          fi

          conda deactivate

      - name: Compare with system tools
        run: |
          echo "=== Comparing with system linker tools ==="

          echo "System ld version:"
          ld --version || echo "System ld not available"

          echo "System lld (if available):"
          which lld && lld --version 2>&1 || echo "System lld not available"

          echo "Available system linkers:"
          ls /usr/bin/*ld* 2>/dev/null || echo "No system linkers found in /usr/bin"

      - name: Dependency deep dive (numba channel)
        run: |
          echo "=== Deep dive into numba channel llvmdev ==="

          conda activate test_numba-channel

          echo "Full dependency tree for ld.lld:"
          ldd $(which ld.lld) | while read line; do
            echo "  $line"
            lib=$(echo "$line" | awk '{print $3}' | grep -v '^(' || true)
            if [[ -n "$lib" && -f "$lib" ]]; then
              echo "    $(ls -la "$lib" 2>/dev/null || echo "File not accessible")"
            fi
          done

          echo "Checking for problematic GLIBCXX symbols:"
          objdump -T $(which ld.lld) | grep GLIBCXX_3.4.30 && echo "❌ Found GLIBCXX_3.4.30 requirement" || echo "✅ No GLIBCXX_3.4.30 requirement"

          echo "All GLIBCXX requirements:"
          objdump -T $(which ld.lld) | grep GLIBCXX | awk '{print $5}' | sort -V | uniq

          conda deactivate
