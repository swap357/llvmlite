name: manylinux-build

on:
  workflow_dispatch:

jobs:
  build-llvmdev:
    name: Build LLVMDEV (Mock)
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      
      - name: Create Mock Artifacts
        run: |
          cd buildscripts/manylinux
          mkdir -p docker_output
          # Create a dummy conda package to simulate LLVMDEV build
          echo "mock content" > docker_output/llvmdev-mock-0.1.0-h123_linux64.tar.bz2
          
      - name: Debug Mock Artifacts
        run: |
          echo "=== Host Directory Structure ==="
          find buildscripts/manylinux/docker_output -type f -name "*.tar.bz2"
          echo "=== File contents ==="
          ls -la buildscripts/manylinux/docker_output/
      
      - name: Upload LLVMDEV artifacts
        uses: actions/upload-artifact@v4
        with:
          name: llvmdev-x86_64
          path: buildscripts/manylinux/docker_output/*.tar.bz2
          retention-days: 1
          if-no-files-found: error

  build-llvmlite:
    needs: build-llvmdev
    name: Build LLVMLITE
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      
      - name: Download LLVMDEV artifacts
        uses: actions/download-artifact@v4
        with:
          name: llvmdev-x86_64
          path: buildscripts/manylinux/docker_output
      
      - name: Debug Downloaded Artifacts
        run: |
          echo "=== Downloaded Artifacts ==="
          ls -la buildscripts/manylinux/docker_output/
      
      - name: Setup local conda channel
        run: |
          cd buildscripts/manylinux
          mkdir -p docker_output/linux-x86_64
          mv docker_output/*.tar.bz2 docker_output/linux-x86_64/ || echo "No .tar.bz2 files found"
          ls -R docker_output/  # Debug: show directory structure
          conda index docker_output
          
      - name: Create Mock LLVMLITE Output
        run: |
          cd buildscripts/manylinux
          mkdir -p docker_output/dist_x86_64/wheelhouse
          echo "mock wheel" > docker_output/dist_x86_64/wheelhouse/llvmlite-mock-0.1.0-cp39-cp39-manylinux2014_x86_64.whl
      
      - name: Upload LLVMLITE artifacts
        uses: actions/upload-artifact@v4
        with:
          name: llvmlite-x86_64
          path: buildscripts/manylinux/docker_output/dist_x86_64/wheelhouse/*.whl
          retention-days: 7
          if-no-files-found: error