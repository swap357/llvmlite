name: manylinux-build

on:
  workflow_dispatch:

jobs:
  build-llvmdev:
    name: Build LLVMDEV
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      
      - name: Build LLVMDEV
        run: |
          cd buildscripts/manylinux
          chmod +x ./docker_run_x64.sh
          mkdir -p docker_output
          # Debug: Show environment
          echo "MINICONDA_FILE=${MINICONDA_FILE}"
          # Run build
          ./docker_run_x64.sh build_llvmdev.sh "${MINICONDA_FILE}"
          
      - name: Debug Docker State
        if: always()
        run: |
          cd buildscripts/manylinux
          echo "=== Docker Container List ==="
          docker ps -a
          # Get the most recent container ID
          CONTAINER_ID=$(docker ps -lq)
          if [ -n "$CONTAINER_ID" ]; then
            echo "=== Container Logs ==="
            docker logs $CONTAINER_ID
            echo "=== Container Directory Structure ==="
            docker exec $CONTAINER_ID ls -R /root/llvmlite/docker_output || echo "Directory not found"
          fi
          
      - name: Move Build Artifacts
        run: |
          cd buildscripts/manylinux
          # Get the most recent container ID
          CONTAINER_ID=$(docker ps -lq)
          if [ -n "$CONTAINER_ID" ]; then
            echo "Using container: $CONTAINER_ID"
            # Try both possible locations
            docker cp $CONTAINER_ID:/root/llvmlite/docker_output/linux-64/*.tar.bz2 docker_output/ || \
            docker cp $CONTAINER_ID:/opt/conda/envs/buildenv/conda-bld/linux-64/*.tar.bz2 docker_output/ || \
            echo "No artifacts found in expected locations"
          else
            echo "No container found"
            exit 1
          fi
      
      - name: Upload LLVMDEV artifacts
        uses: actions/upload-artifact@v4
        with:
          name: llvmdev-x86_64
          path: buildscripts/manylinux/docker_output/*.tar.bz2
          retention-days: 1
          if-no-files-found: error

  build-llvmlite:
    needs: build-llvmdev
    name: Build LLVMLITE
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      
      - uses: conda-incubator/setup-miniconda@v3
        with:
          auto-activate-base: true
          python-version: "3.9"
      
      - name: Install conda-build
        shell: bash -el {0}
        run: |
          conda install -y conda-build
      
      - name: Download LLVMDEV artifacts
        uses: actions/download-artifact@v4
        with:
          name: llvmdev-x86_64
          path: buildscripts/manylinux/docker_output
      
      - name: Debug Downloaded Artifacts
        run: |
          echo "=== Downloaded Artifacts ==="
          ls -la buildscripts/manylinux/docker_output/
      
      - name: Setup local conda channel
        shell: bash -el {0}
        run: |
          cd buildscripts/manylinux
          mkdir -p docker_output/linux-x86_64
          mv docker_output/*.tar.bz2 docker_output/linux-x86_64/ || echo "No .tar.bz2 files found"
          ls -R docker_output/  # Debug: show directory structure
          conda index docker_output
      
      - name: Build LLVMLITE
        run: |
          cd buildscripts/manylinux
          chmod +x ./docker_run_x64.sh
          ./docker_run_x64.sh build_llvmlite.sh
      
      - name: Upload LLVMLITE artifacts
        uses: actions/upload-artifact@v4
        with:
          name: llvmlite-x86_64
          path: buildscripts/manylinux/docker_output/dist_x86_64/wheelhouse/*.whl
          retention-days: 7
          if-no-files-found: error