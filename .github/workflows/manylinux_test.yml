name: manylinux-build

on:
  workflow_dispatch:

jobs:
  build-llvmdev:
    name: Build LLVMDEV
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      
      - name: Build LLVMDEV
        run: |
          cd buildscripts/manylinux
          chmod +x ./docker_run_x64.sh
          mkdir -p docker_output
          # Mount the repository root using GITHUB_WORKSPACE
          docker run --name manylinux-build \
            -v ${GITHUB_WORKSPACE}:/root/llvmlite \
            -d quay.io/pypa/manylinux2014_x86_64 tail -f /dev/null
          # Execute build script with miniconda URL
          docker exec manylinux-build bash /root/llvmlite/buildscripts/manylinux/build_llvmdev.sh ${MINICONDA_FILE}
          
      - name: Debug Container Status
        if: always()
        run: |
          echo "=== Docker Container Status ==="
          docker ps -a
          echo "=== Docker Container Logs ==="
          docker logs manylinux-build || echo "No logs available"
          
      - name: Move Build Artifacts
        run: |
          cd buildscripts/manylinux
          mkdir -p docker_output
          # The output should be in /root/llvmlite/docker_output inside container
          docker cp manylinux-build:/root/llvmlite/docker_output/linux-64/*.tar.bz2 docker_output/ || echo "No artifacts in expected location"
      
      - name: Debug Build Artifacts
        run: |
          echo "=== Host Directory Structure ==="
          find buildscripts/manylinux/docker_output -type f || echo "No files in docker_output"
          echo "=== File contents ==="
          ls -la buildscripts/manylinux/docker_output/
      
      - name: Upload LLVMDEV artifacts
        uses: actions/upload-artifact@v4
        with:
          name: llvmdev-x86_64
          path: buildscripts/manylinux/docker_output/*.tar.bz2
          retention-days: 1
          if-no-files-found: error

  build-llvmlite:
    needs: build-llvmdev
    name: Build LLVMLITE
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      
      - uses: conda-incubator/setup-miniconda@v3
        with:
          auto-activate-base: true
          python-version: "3.9"
      
      - name: Install conda-build
        shell: bash -el {0}
        run: |
          conda install -y conda-build
      
      - name: Download LLVMDEV artifacts
        uses: actions/download-artifact@v4
        with:
          name: llvmdev-x86_64
          path: buildscripts/manylinux/docker_output
      
      - name: Debug Downloaded Artifacts
        run: |
          echo "=== Downloaded Artifacts ==="
          ls -la buildscripts/manylinux/docker_output/
      
      - name: Setup local conda channel
        shell: bash -el {0}
        run: |
          cd buildscripts/manylinux
          mkdir -p docker_output/linux-x86_64
          mv docker_output/*.tar.bz2 docker_output/linux-x86_64/ || echo "No .tar.bz2 files found"
          ls -R docker_output/  # Debug: show directory structure
          conda index docker_output
      
      - name: Build LLVMLITE
        run: |
          cd buildscripts/manylinux
          chmod +x ./docker_run_x64.sh
          ./docker_run_x64.sh build_llvmlite.sh
      
      - name: Upload LLVMLITE artifacts
        uses: actions/upload-artifact@v4
        with:
          name: llvmlite-x86_64
          path: buildscripts/manylinux/docker_output/dist_x86_64/wheelhouse/*.whl
          retention-days: 7
          if-no-files-found: error